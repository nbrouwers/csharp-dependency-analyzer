name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --no-incremental

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

  publish:
    name: Publish Portable Executable
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained executable
        run: dotnet publish src/DependencyAnalyzer -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DependencyAnalyzer-win-x64
          path: publish/DependencyAnalyzer.exe
          if-no-files-found: error
          retention-days: 90
